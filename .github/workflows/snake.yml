name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # हर रोज आधी रात को अपने-आप रन होगा
  workflow_dispatch:       # आप चाहें तो मैन्युअली भी रन कर सकते हैं

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # नई इमेज को पुश करने के लिए परमिशन

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: AnujChaudhari  # ← अपना यूजरनेम डालें (पहले से ही सही है)
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output   # यहाँ पर हम 'output' ब्रांच में सेव करेंगे
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
